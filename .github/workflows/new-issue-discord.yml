name: Discord Issue Webhook

on:
  issues:
    types: [opened, reopened]

jobs:
  discordNotification:
    runs-on: ubuntu-latest
    steps:
      - name: Send issue embed to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_ISSUE_WEBHOOK }}
          TITLE: ${{ github.event.issue.title }}
          URL: ${{ github.event.issue.html_url }}
          BODY: ${{ github.event.issue.body }}
          USER_LOGIN: ${{ github.event.issue.user.login }}
          USER_AVATAR: ${{ github.event.issue.user.avatar_url }}
          NUMBER: ${{ github.event.issue.number }}
          TIMESTAMP: ${{ github.event.issue.created_at }}
        run: |
          # Discord caps embed description at 4096 chars (total embed 6000). Crash-report
          # bodies dwarf that and Discord answers 400 — silently killing the webhook.
          # Truncate with headroom so we never trip the limit.
          DESC="${BODY}"
          if [ ${#DESC} -gt 3800 ]; then
            DESC="${DESC:0:3800}

…(truncated; open the issue for full body)"
          fi
          jq -n \
            --arg title "New Issue: ${TITLE}" \
            --arg url "${URL}" \
            --arg description "${DESC}" \
            --arg author_name "${USER_LOGIN}" \
            --arg author_icon "${USER_AVATAR}" \
            --arg footer "Issue #${NUMBER}" \
            --arg timestamp "${TIMESTAMP}" \
            '{
              allowed_mentions: { parse: [] },
              embeds: [{
                title: $title,
                url: $url,
                description: $description,
                color: 5814783,
                author: { name: $author_name, icon_url: $author_icon },
                footer: { text: $footer },
                timestamp: $timestamp
              }]
            }' | curl -fsS -H "Content-Type: application/json" -X POST -d @- "$WEBHOOK"
